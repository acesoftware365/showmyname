name: showmyname
description: A minimal fullscreen digital sign app for airport pickup and concerts (EN/ES).
publish_to: "none"
version: 1.0.14+19

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  intl: any

  share_plus: ^10.0.0
  package_info_plus: ^8.0.2
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  auto_size_text: ^3.0.0
  path: ^1.9.0
  go_router: ^14.2.0
  wakelock_plus: ^1.2.8
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.0
  url_launcher: ^6.2.6
  google_mobile_ads: ^5.1.0
  in_app_purchase: ^3.2.0
  http: ^1.2.2
  in_app_update: ^4.2.3

dependency_overrides:
  path_provider_foundation: 2.5.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/showMeNameLogoAndroid.png

flutter_icons:
  android: true
  ios: false
  image_path: assets/showMeNameLogoAndroid.png
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: assets/showMeNameLogoAndroid.png
